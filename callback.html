<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Code OAuth — HTT Autopost</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
    #code-box { background: #f4f4f4; border: 2px solid #0866FF; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; }
    button { background: #0866FF; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:active { opacity: 0.8; }
    .success { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h2>✅ Autorisation Facebook réussie</h2>
  <p>Copie le code ci-dessous et colle-le dans Claude Code :</p>
  <div id="code-box">Chargement…</div>
  <button onclick="copy()">Copier le code</button>
  <p id="msg"></p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const box = document.getElementById('code-box');
    if (code) {
      box.textContent = code;
    } else if (error) {
      box.textContent = 'Erreur : ' + error + ' — ' + (params.get('error_description') || '');
      box.style.borderColor = 'red';
    } else {
      box.textContent = 'Aucun code trouvé. URL complète : ' + window.location.href;
    }
    function copy() {
      navigator.clipboard.writeText(box.textContent).then(() => {
        document.getElementById('msg').textContent = '✓ Copié !';
        document.getElementById('msg').className = 'success';
      });
    }
  </script>
</body>
</html>
